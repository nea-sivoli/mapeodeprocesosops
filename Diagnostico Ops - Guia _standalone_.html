document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ill);\n    font-size: 10px;\n    font-weight: 600;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n  .critical-tag svg { width: 11px; height: 11px; }\n\n  .flow {\n    display: flex;\n    align-items: stretch;\n    gap: 8px;\n    min-width: 820px;\n    padding-top: 8px;\n  }\n  .node {\n    flex: 1;\n    background: var(--white);\n    border-radius: var(--r-card);\n    padding: 16px 14px 14px;\n    position: relative;\n    border: 1.5px solid var(--border);\n    display: flex;\n    flex-direction: column;\n    min-height: 128px;\n  }\n  .node.warn { background: var(--cream); border-color: var(--mango-gold); }\n  .node-step {\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.14em;\n    color: var(--taupe);\n    margin-bottom: 8px;\n    text-transform: uppercase;\n  }\n  .node-title {\n    font-size: 13.5px;\n    font-weight: 600;\n    color: var(--dark-navy);\n    line-height: 1.35;\n    margin-bottom: 10px;\n  }\n  .node-meta {\n    margin-top: auto;\n    font-size: 11.5px;\n    color: var(--body-dark);\n    line-height: 1.45;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .node-meta svg { width: 11px; height: 11px; color: var(--taupe); flex-shrink: 0; }\n  .node-status {\n    position: absolute;\n    top: -10px;\n    right: 12px;\n    padding: 3px 10px;\n    border-radius: var(--r-pill);\n    font-size: 10px;\n    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 0.06em;\n    background: var(--mango-gold);\n    color: var(--dark-navy);\n  }\n  .arrow {\n    display: flex;\n    align-items: center;\n    color: var(--taupe);\n    flex-shrink: 0;\n  }\n  .arrow svg { width: 18px; height: 18px; }\n\n  .legend {\n    display: flex;\n    gap: 28px;\n    margin-top: 24px;\n    padding-top: 18px;\n    border-top: 1px solid var(--border);\n    font-size: 12px;\n    color: var(--body-dark);\n    flex-wrap: wrap;\n  }\n  .legend-item { display: flex; align-items: center; gap: 8px; }\n  .legend-dot {\n    width: 10px;\n    height: 10px;\n    border-radius: var(--r-pill);\n    border: 1.5px solid var(--border);\n    background: var(--white);\n  }\n  .legend-dot.warn { background: var(--cream); border-color: var(--mango-gold); }\n\n  /* How it works — now 4 cards */\n  .how-steps {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 14px;\n    margin-top: 8px;\n    margin-bottom: 28px;\n  }\n  .how-card {\n    background: var(--white);\n    border: 1px solid var(--border);\n    border-radius: var(--r-card);\n    padding: 22px 20px;\n    display: flex;\n    flex-direction: column;\n    min-height: 190px;\n  }\n  .how-num {\n    font-size: 32px;\n    font-weight: 700;\n    color: var(--mango-gold);\n    line-height: 1;\n    margin-bottom: 14px;\n    letter-spacing: -0.02em;\n  }\n  .how-title {\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--dark-navy);\n    margin-bottom: 6px;\n  }\n  .how-desc {\n    font-size: 12.5px;\n    color: var(--body-dark);\n    line-height: 1.55;\n  }\n\n  /* Prompt */\n  .prompt-wrap { margin-top: 24px; }\n  .prompt-label {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--taupe);\n    margin-bottom: 10px;\n  }\n  .prompt-label svg { width: 12px; height: 12px; }\n\n  .prompt-box {\n    background: var(--dark-navy);\n    color: #D6D0E6;\n    border-radius: var(--r-card);\n    padding: 20px 24px;\n    font-family: 'Inter', sans-serif;\n    font-size: 12.5px;\n    line-height: 1.5;\n    position: relative;\n    white-space: pre-wrap;\n  }\n  .prompt-box .p-title {\n    display: block;\n    color: var(--mango-gold);\n    font-weight: 600;\n    margin-top: 10px;\n    margin-bottom: 1px;\n    font-size: 12.5px;\n  }\n  .prompt-box .p-title:first-child { margin-top: 0; }\n  .prompt-box em {\n    display: block;\n    font-size: 11.5px;\n    color: var(--taupe);\n    margin-top: 12px;\n    padding-top: 10px;\n    border-top: 1px solid rgba(255,255,255,0.12);\n    font-style: normal;\n  }\n  .prompt-box ol, .prompt-box ul {\n    padding-left: 18px;\n    margin: 0;\n  }\n  .prompt-box li { margin: 0 0 2px; line-height: 1.25; }\n\n  .copy-btn {\n    position: absolute;\n    top: 14px;\n    right: 14px;\n    background: var(--mango-gold);\n    color: var(--dark-navy);\n    border: none;\n    padding: 7px 14px;\n    border-radius: var(--r-chip);\n    font-family: 'Inter', sans-serif;\n    font-size: 12px;\n    font-weight: 600;\n    cursor: pointer;\n    transition: background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .copy-btn svg { width: 13px; height: 13px; }\n  .copy-btn:hover { background: var(--mango-gold-soft); }\n  .copy-btn:active { background: var(--mango-gold-deep); transform: scale(0.985); }\n  .copy-btn.copied { background: var(--purple); color: var(--white); }\n\n  /* Chips */\n  .chips {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 10px;\n    margin-top: 4px;\n  }\n  .chip {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 9px 16px 9px 8px;\n    background: var(--white);\n    border: 1px solid var(--border);\n    border-radius: var(--r-pill);\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--dark-navy);\n  }\n  .chip-num {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    width: 22px;\n    height: 22px;\n    background: var(--mango-gold);\n    color: var(--dark-navy);\n    border-radius: var(--r-pill);\n    font-size: 11px;\n    font-weight: 700;\n  }\n\n  .note {\n    font-size: 13px;\n    color: var(--taupe);\n    margin-top: 14px;\n    line-height: 1.55;\n  }\n  .note strong { color: var(--dark-navy); font-weight: 600; }\n\n  .callout {\n    background: var(--lavender);\n    border-radius: var(--r-card);\n    padding: 16px 20px;\n    margin-top: 16px;\n    font-size: 14px;\n    color: var(--dark-navy);\n    display: flex;\n    gap: 12px;\n    align-items: flex-start;\n    line-height: 1.55;\n  }\n  .callout-icon {\n    flex-shrink: 0;\n    width: 28px;\n    height: 28px;\n    background: var(--purple);\n    color: var(--white);\n    border-radius: var(--r-pill);\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .callout-icon svg { width: 15px; height: 15px; }\n  .callout strong { font-weight: 600; }\n\n  /* Closing */\n  .closing {\n    background: var(--dark-navy);\n    color: var(--white);\n    padding: 32px 36px;\n    border-radius: var(--r-card);\n    margin-top: 8px;\n    display: grid;\n    gap: 16px;\n  }\n  .closing-row {\n    display: grid;\n    grid-template-columns: 180px 1fr;\n    gap: 24px;\n    font-size: 14.5px;\n    line-height: 1.55;\n    align-items: start;\n    padding-bottom: 16px;\n    border-bottom: 1px solid rgba(255,255,255,0.12);\n  }\n  .closing-row:last-child { border-bottom: none; padding-bottom: 0; }\n  .closing-who {\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--mango-gold);\n    padding-top: 3px;\n  }\n  .closing-what { color: #E6E1F2; }\n\n  footer {\n    margin-top: 64px;\n    padding-top: 24px;\n    border-top: 1px solid var(--border);\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-size: 11px;\n    color: var(--taupe);\n    letter-spacing: 0.04em;\n  }\n  footer img { height: 18px; opacity: 0.8; }\n\n  @media (max-width: 820px) {\n    body { padding: 24px 12px 48px; }\n    .page { padding: 44px 28px 36px; }\n    h1 { font-size: 32px; }\n    h2 { font-size: 22px; }\n    .how-steps { grid-template-columns: repeat(2, 1fr); }\n    .primer-grid, .outputs, .checklist { grid-template-columns: 1fr; }\n    .metrics { grid-template-columns: repeat(2, 1fr); }\n    .swimlanes { grid-template-columns: 1fr; }\n    .primer { padding: 24px 22px; }\n    .level-wrapper { padding: 24px 22px 20px; }\n    .closing-row { grid-template-columns: 1fr; gap: 6px; }\n  }\n\n  @media print {\n    body { background: var(--white); padding: 0; }\n    .page { box-shadow: none; padding: 40px; max-width: 100%; }\n    .copy-btn { display: none; }\n    section { page-break-inside: avoid; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"page\">\n    <div class=\"accent-bar\"><\u002Fdiv>\n\n    <div class=\"overline\">Diagnóstico de Operaciones · Paso uno: Mapeo<\u002Fdiv>\n    <h1>Guía de mapeo de procesos<\u002Fh1>\n    <p class=\"subtitle\">Qué es, por qué lo hacemos, cómo se ve y qué necesitamos para arrancar.<\u002Fp>\n\n    <div class=\"meta\">\n      <div class=\"meta-item\">\n        <span class=\"meta-label\">Fecha<\u002Fspan>\n        <span class=\"meta-value\">Abril 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Intro -->\n    <div class=\"intro\">\n      <span class=\"intro-pill\">Contexto<\u002Fspan>\n      <p>El paso uno del diagnóstico es mapear los procesos de Ops e identificar los críticos.<br><br>A partir de ahí entendemos los <strong>qué<\u002Fstrong> y los <strong>cómo<\u002Fstrong>, antes de sumar más personas al equipo.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- SECTION 0 -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">00<\u002Fspan>\n        <h2>Primero, lo básico<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"primer\">\n        <span class=\"primer-eyebrow\">Qué es un mapeo de procesos<\u002Fspan>\n        <p>Un mapeo de procesos es dibujar, paso a paso, cómo se hace algo dentro del equipo. En lugar de tenerlo en la cabeza de quien lo ejecuta, lo pones en un diagrama para que <strong>cualquiera lo entienda<\u002Fstrong>: quién participa, qué herramientas usa, cuánto tarda, qué depende de qué.<\u002Fp>\n\n        <div class=\"primer-grid\">\n          <div class=\"primer-block\">\n            <h4>Por qué lo hacemos<\u002Fh4>\n            <p>Un proceso no mapeado es una caja negra: solo funciona si la persona que lo hace está disponible, recuerda los pasos y no tiene un mal día. Mapearlo lo hace visible, transferible y mejorable. También nos deja comparar cómo se hace hoy versus cómo debería hacerse.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"primer-block\">\n            <h4>Qué problemas ayuda a resolver<\u002Fh4>\n            <p>Procesos que dependen de una sola persona. Pasos manuales que podrían automatizarse. Cuellos de botella que nadie había puesto sobre la mesa. Decisiones sin dueño claro. Tiempos que no cuadran con la realidad. Riesgos operativos escondidos.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"outputs-heading\">Al terminar el mapeo vamos a tener:<\u002Fdiv>\n      <div class=\"outputs\">\n        <div class=\"output-card\">\n          <span class=\"output-icon\"><i data-lucide=\"eye\"><\u002Fi><\u002Fspan>\n          <h5>Visibilidad total<\u002Fh5>\n          <p>Una foto clara de todos los procesos de Ops y quién los ejecuta hoy.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"output-card\">\n          <span class=\"output-icon\"><i data-lucide=\"target\"><\u002Fi><\u002Fspan>\n          <h5>Puntos de dolor identificados<\u002Fh5>\n          <p>Dónde se atora el equipo, qué consume más tiempo y qué tiene mayor riesgo.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"output-card\">\n          <span class=\"output-icon\"><i data-lucide=\"compass\"><\u002Fi><\u002Fspan>\n          <h5>Base para decidir<\u002Fh5>\n          <p>Qué automatizar, qué rediseñar, qué delegar y qué perfil contratar.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECTION 1 — 3-level progression -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">01<\u002Fspan>\n        <h2>Cómo evoluciona un mapa, usando un ejemplo sencillo<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-lede\" style=\"font-size: 15px\">Mapear un proceso no es una sola cosa — se hace por capas. Cada nivel agrega información y hace el mapa más útil para tomar decisiones. Usamos pedir un café como ejemplo para que se entienda puro el concepto.<\u002Fp>\n\n      <!-- LEVEL 1 -->\n      <div class=\"level-wrapper\">\n        <div class=\"level-header\">\n          <span class=\"level-tag\">Nivel 1<\u002Fspan>\n          <span class=\"level-title\">Flujo básico<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"level-desc\">Los pasos en orden. Responde solamente al <strong>qué<\u002Fstrong> pasa, nada más.<\u002Fdiv>\n\n        <div class=\"basic-flow\">\n          <div class=\"basic-node\">1. Entrar al local<\u002Fdiv>\n          <div class=\"basic-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"basic-node\">2. Ordenar café<\u002Fdiv>\n          <div class=\"basic-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"basic-node\">3. Pagar<\u002Fdiv>\n          <div class=\"basic-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"basic-node\">4. Recibir café<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"level-caption\">\n          <strong>Lo que ves:<\u002Fstrong> la secuencia. <strong>Lo que no ves:<\u002Fstrong> quién hace cada paso, cuánto tarda, dónde se atora, qué puede salir mal. Útil solo para una introducción. Insuficiente para mejorar nada.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LEVEL 2 -->\n      <div class=\"level-wrapper\">\n        <div class=\"level-header\">\n          <span class=\"level-tag\">Nivel 2<\u002Fspan>\n          <span class=\"level-title\">Flujo con carriles (quién hace qué)<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"level-desc\">Los pasos organizados por actor. Cada vez que una tarea cambia de carril es un <strong>handoff<\u002Fstrong>, punto típico de fricción.<\u002Fdiv>\n\n        <div class=\"swimlanes\">\n          <div class=\"lane-label\">Cliente<\u002Fdiv>\n          <div class=\"lane-track\">\n            <div class=\"lane-node\"><span class=\"step-dot\">1<\u002Fspan>Entrar<\u002Fdiv>\n            <span class=\"lane-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fspan>\n            <div class=\"lane-node\"><span class=\"step-dot\">2<\u002Fspan>Ordenar<\u002Fdiv>\n            <span class=\"handoff\">Handoff<\u002Fspan>\n            <span class=\"lane-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fspan>\n            <div class=\"lane-node\"><span class=\"step-dot\">4<\u002Fspan>Pagar<\u002Fdiv>\n            <span class=\"handoff\">Handoff<\u002Fspan>\n            <span class=\"lane-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fspan>\n            <div class=\"lane-node\"><span class=\"step-dot\">6<\u002Fspan>Recibir café<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"lane-label\">Barista<\u002Fdiv>\n          <div class=\"lane-track\">\n            <div class=\"lane-node\"><span class=\"step-dot\">3<\u002Fspan>Preparar café<\u002Fdiv>\n            <span class=\"lane-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fspan>\n            <div class=\"lane-node\"><span class=\"step-dot\">5<\u002Fspan>Entregar café<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"lane-label\">Cajero<\u002Fdiv>\n          <div class=\"lane-track\">\n            <div class=\"lane-node\"><span class=\"step-dot\">4<\u002Fspan>Cobrar<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"level-caption\">\n          <strong>Lo que ves ahora:<\u002Fstrong> hay tres actores, no uno. Hay dos handoffs (donde la pelota cambia de mano) y son los lugares donde típicamente se caen las bolas: el cliente espera, el barista no sabe si ya pagaron, el cajero no sabe qué ordenó. <strong>Este nivel ya te sirve para detectar dependencias entre personas.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LEVEL 3 -->\n      <div class=\"level-wrapper\">\n        <div class=\"level-header\">\n          <span class=\"level-tag\">Nivel 3<\u002Fspan>\n          <span class=\"level-title\">Flujo enriquecido (con todo)<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"level-desc\">A cada paso le agregamos tiempos, herramientas, inputs/outputs, puntos de decisión y excepciones. <strong>Este es el nivel que habilita decisiones de mejora.<\u002Fstrong><\u002Fdiv>\n\n        <div class=\"enriched-wrapper\">\n          <div class=\"enriched-flow\">\n\n            <div class=\"enriched-node\">\n              <div class=\"en-step\">Paso 01<\u002Fdiv>\n              <div class=\"en-title\">Entrar al local<\u002Fdiv>\n              <div class=\"en-field\"><strong>Actor:<\u002Fstrong> Cliente<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. activo:<\u002Fstrong> 30 seg<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. espera:<\u002Fstrong> 0<\u002Fdiv>\n              <div class=\"en-field-sep\"><\u002Fdiv>\n              <div class=\"en-field\"><strong>Herramienta:<\u002Fstrong> —<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"en-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n\n            <div class=\"enriched-node warn\">\n              <div class=\"en-badge\">Cuello<\u002Fdiv>\n              <div class=\"en-step\">Paso 02<\u002Fdiv>\n              <div class=\"en-title\">Ordenar en caja<\u002Fdiv>\n              <div class=\"en-field\"><strong>Actor:<\u002Fstrong> Cliente + Cajero<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. activo:<\u002Fstrong> 1 min<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. espera:<\u002Fstrong> 5–10 min fila<\u002Fdiv>\n              <div class=\"en-field-sep\"><\u002Fdiv>\n              <div class=\"en-field\"><strong>Input:<\u002Fstrong> Menú<\u002Fdiv>\n              <div class=\"en-field\"><strong>Output:<\u002Fstrong> Orden<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"en-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n\n            <div class=\"enriched-node decision\">\n              <div class=\"en-badge decision\">Decisión<\u002Fdiv>\n              <div class=\"en-step\">Paso 03<\u002Fdiv>\n              <div class=\"en-title\">¿Efectivo o tarjeta?<\u002Fdiv>\n              <div class=\"en-field\"><strong>Actor:<\u002Fstrong> Cliente<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. activo:<\u002Fstrong> 30 seg<\u002Fdiv>\n              <div class=\"en-field-sep\"><\u002Fdiv>\n              <div class=\"en-field\"><strong>Ramifica en:<\u002Fstrong> 2 caminos<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"en-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n\n            <div class=\"enriched-node\">\n              <div class=\"en-step\">Paso 04<\u002Fdiv>\n              <div class=\"en-title\">Cobro y ticket<\u002Fdiv>\n              <div class=\"en-field\"><strong>Actor:<\u002Fstrong> Cajero<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. activo:<\u002Fstrong> 1 min<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. espera:<\u002Fstrong> 0<\u002Fdiv>\n              <div class=\"en-field-sep\"><\u002Fdiv>\n              <div class=\"en-field\"><strong>Sistema:<\u002Fstrong> POS<\u002Fdiv>\n              <div class=\"en-field\"><strong>Output:<\u002Fstrong> Recibo<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"en-arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n\n            <div class=\"enriched-node warn\">\n              <div class=\"en-badge\">Variable<\u002Fdiv>\n              <div class=\"en-step\">Paso 05<\u002Fdiv>\n              <div class=\"en-title\">Preparar y entregar<\u002Fdiv>\n              <div class=\"en-field\"><strong>Actor:<\u002Fstrong> Barista<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. activo:<\u002Fstrong> 2–5 min<\u002Fdiv>\n              <div class=\"en-field\"><strong>T. espera:<\u002Fstrong> depende fila<\u002Fdiv>\n              <div class=\"en-field-sep\"><\u002Fdiv>\n              <div class=\"en-field\"><strong>Herramienta:<\u002Fstrong> Máquina<\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"exception-row\">\n          <span class=\"exception-icon\"><i data-lucide=\"alert-triangle\"><\u002Fi><\u002Fspan>\n          <div><strong>Excepción:<\u002Fstrong> si la tarjeta se rechaza en el paso 4, el cliente vuelve al paso 3 a elegir otro método. Si falla el efectivo (no hay cambio), el barista ya empezó a preparar — hay desperdicio. <strong>Esta rama es lo que diferencia un proceso robusto de uno frágil.<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"metrics\">\n          <div class=\"metric\">\n            <div class=\"metric-label\">Frecuencia<\u002Fdiv>\n            <div class=\"metric-value\">200<\u002Fdiv>\n            <div class=\"metric-sub\">cafés por día<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metric\">\n            <div class=\"metric-label\">T. activo total<\u002Fdiv>\n            <div class=\"metric-value\">5 min<\u002Fdiv>\n            <div class=\"metric-sub\">trabajo real<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metric\">\n            <div class=\"metric-label\">T. ciclo total<\u002Fdiv>\n            <div class=\"metric-value\">10–15 min<\u002Fdiv>\n            <div class=\"metric-sub\">con esperas<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metric\">\n            <div class=\"metric-label\">Dolor<\u002Fdiv>\n            <div class=\"metric-value\">3 / 5<\u002Fdiv>\n            <div class=\"metric-sub\">hora pico<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"level-caption\">\n          <strong>Lo que ves ahora:<\u002Fstrong> el tiempo de espera es el doble del tiempo activo — el 60% del tiempo nadie está trabajando, solo esperando. El cuello es la fila de caja, no la preparación. Una app para ordenar antes de llegar eliminaría ese cuello sin contratar a nadie. <strong>El mapa te dice dónde invertir.<\u002Fstrong>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECTION 2 — 10 dimensions -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">02<\u002Fspan>\n        <h2>Qué pensar frente a cualquier proceso<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-lede\" style=\"font-size: 15px\">Estas son las 10 dimensiones que un buen mapa cubre. No todas aplican siempre, pero <strong>preguntárselas es el diferencial<\u002Fstrong> entre describir un proceso y entenderlo a fondo.<\u002Fp>\n\n      <div class=\"checklist\">\n        <div class=\"dim\"><div class=\"dim-num\">1<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Actores<\u002Fdiv><div class=\"dim-q\">¿Quién ejecuta, quién aprueba, quién decide, quién se ve impactado?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">2<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Tiempos<\u002Fdiv><div class=\"dim-q\">¿Cuánto tiempo activo vs. tiempo de espera? ¿Cuánto es el ciclo total?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">3<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Herramientas y sistemas<\u002Fdiv><div class=\"dim-q\">¿Qué software, plataformas o documentos se usan en cada paso?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">4<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Inputs y outputs<\u002Fdiv><div class=\"dim-q\">¿Qué información o materiales entran y salen de cada paso?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">5<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Decisiones<\u002Fdiv><div class=\"dim-q\">¿Dónde el proceso se bifurca? ¿Qué criterio se usa para elegir?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">6<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Excepciones<\u002Fdiv><div class=\"dim-q\">¿Qué pasa si algo sale mal? ¿Quién lo arregla y cómo?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">7<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Volumen<\u002Fdiv><div class=\"dim-q\">¿Cuántas veces se ejecuta al día, semana o mes?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">8<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Costo<\u002Fdiv><div class=\"dim-q\">¿Costo directo (herramientas, terceros) y costo de oportunidad del tiempo invertido?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">9<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Métricas de éxito<\u002Fdiv><div class=\"dim-q\">¿Cómo sabemos que el proceso salió bien? ¿Qué se mide hoy?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"dim\"><div class=\"dim-num\">10<\u002Fdiv><div class=\"dim-body\"><div class=\"dim-title\">Riesgos y dependencias<\u002Fdiv><div class=\"dim-q\">¿Qué pasa si falla un sistema, un tercero o la persona clave?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECTION 3 — STP real example -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">03<\u002Fspan>\n        <h2>Así se ve aplicado a un proceso real de Mango<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-lede\" style=\"font-size: 15px\">Llevamos la misma lógica al proceso de apertura de Centros de Pagos STP, uno de los más críticos del equipo hoy.<\u002Fp>\n\n      <div class=\"flow-wrapper\">\n        <div class=\"flow-header\">\n          <div class=\"flow-title-group\">\n            <span class=\"flow-overline\">Ejemplo · proceso mapeado<\u002Fspan>\n            <span class=\"flow-title\">\n              Apertura de Centro de Pagos STP\n              <span class=\"critical-tag\"><i data-lucide=\"alert-triangle\"><\u002Fi>Crítico<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"flow\">\n          <div class=\"node warn\">\n            <div class=\"node-status\">Atorado<\u002Fdiv>\n            <div class=\"node-step\">Paso 01<\u002Fdiv>\n            <div class=\"node-title\">Solicitar docs al distribuidor<\u002Fdiv>\n            <div class=\"node-meta\"><i data-lucide=\"user\"><\u002Fi>Ops · sin SLA definido<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"node\">\n            <div class=\"node-step\">Paso 02<\u002Fdiv>\n            <div class=\"node-title\">Revisión interna de expediente<\u002Fdiv>\n            <div class=\"node-meta\"><i data-lucide=\"user\"><\u002Fi>Ops · 1–2 hrs<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"node warn\">\n            <div class=\"node-status\">Manual<\u002Fdiv>\n            <div class=\"node-step\">Paso 03<\u002Fdiv>\n            <div class=\"node-title\">Llenar cédula STP campo por campo<\u002Fdiv>\n            <div class=\"node-meta\"><i data-lucide=\"user\"><\u002Fi>Ops · 2–3 hrs<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"node\">\n            <div class=\"node-step\">Paso 04<\u002Fdiv>\n            <div class=\"node-title\">Envío y seguimiento con STP<\u002Fdiv>\n            <div class=\"node-meta\"><i data-lucide=\"user\"><\u002Fi>Ops · 1–3 días hábiles<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arrow\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fdiv>\n          <div class=\"node warn\">\n            <div class=\"node-status\">Sin tracking<\u002Fdiv>\n            <div class=\"node-step\">Paso 05<\u002Fdiv>\n            <div class=\"node-title\">Firma Mifiel + alta en SICLI<\u002Fdiv>\n            <div class=\"node-meta\"><i data-lucide=\"users\"><\u002Fi>Ops + distribuidor · hasta 48 hrs<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"legend\">\n          <div class=\"legend-item\"><span class=\"legend-dot\"><\u002Fspan>Operando<\u002Fdiv>\n          <div class=\"legend-item\"><span class=\"legend-dot warn\"><\u002Fspan>Cuello de botella o punto a revisar<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECTION 4 — How we'll do it -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">04<\u002Fspan>\n        <h2>Cómo lo vamos a hacer<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-lede\" style=\"font-size: 15px\">Vamos a mapear los procesos actuales de Ops en cuatro pasos. La idea es que Ops capture en voice notes (gran ahorro de tiempo) y CoS ayuda en la traducción a mapa visual sobre el cual nos apoyaremos para hacer el diagnóstico y next steps.<\u002Fp>\n\n      <div class=\"how-steps\">\n        <div class=\"how-card\">\n          <div class=\"how-num\">01<\u002Fdiv>\n          <div class=\"how-title\">Enlistar todos los procesos<\u002Fdiv>\n          <div class=\"how-desc\">Ops escribe una lista completa de los procesos que hoy ejecuta el equipo, sin detalle todavía. Solo nombres.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-card\">\n          <div class=\"how-num\">02<\u002Fdiv>\n          <div class=\"how-title\">Asignar criticidad<\u002Fdiv>\n          <div class=\"how-desc\">A cada proceso le ponemos un valor del más crítico al menos crítico, usando los criterios de abajo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-card\">\n          <div class=\"how-num\">03<\u002Fdiv>\n          <div class=\"how-title\">Dictar uno por uno<\u002Fdiv>\n          <div class=\"how-desc\">Empezando por el más crítico, Ops le dicta a ChatGPT cada proceso con el prompt de abajo. Voice note descriptivo de todos los pasos.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-card\">\n          <div class=\"how-num\">04<\u002Fdiv>\n          <div class=\"how-title\">Pegar en un Doc<\u002Fdiv>\n          <div class=\"how-desc\">La respuesta de ChatGPT se pega en un Doc compartido, identificando cada proceso con su nombre. De ahí se traslada al mapa visual.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"subheading\">Criterios de criticidad para el paso 2<\u002Fdiv>\n      <p style=\"font-size: 14px; margin-bottom: 14px;\">Un proceso sube en la lista de prioridad si cumple uno o más de estos:<\u002Fp>\n      <div class=\"chips\">\n        <span class=\"chip\"><span class=\"chip-num\">1<\u002Fspan>Alto volumen o frecuencia<\u002Fspan>\n        <span class=\"chip\"><span class=\"chip-num\">2<\u002Fspan>Consume más de 4 hrs por ciclo<\u002Fspan>\n        <span class=\"chip\"><span class=\"chip-num\">3<\u002Fspan>Riesgo alto si falla (financiero o legal)<\u002Fspan>\n        <span class=\"chip\"><span class=\"chip-num\">4<\u002Fspan>Depende de una sola persona<\u002Fspan>\n        <span class=\"chip\"><span class=\"chip-num\">5<\u002Fspan>Truena al escalar el negocio<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"note\">Estos criterios son una <strong>sugerencia inicial<\u002Fstrong>. Los ajustamos con el feedback de Ops sobre lo que el equipo considera más importante.<\u002Fp>\n\n      <div class=\"callout\">\n        <span class=\"callout-icon\"><i data-lucide=\"lightbulb\"><\u002Fi><\u002Fspan>\n        <div><strong>Hipótesis inicial:<\u002Fstrong> Centros de Pagos STP ya califica como crítico. Los demás los validamos con el listado completo.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"prompt-wrap\">\n        <div class=\"prompt-label\"><i data-lucide=\"clipboard\"><\u002Fi>Prompt para ChatGPT (paso 3)<\u002Fdiv>\n        <div class=\"prompt-box\">\n<button class=\"copy-btn\" onclick=\"copyPrompt(this)\"><i data-lucide=\"copy\"><\u002Fi><span>Copiar<\u002Fspan><\u002Fbutton>\n<div id=\"prompt-text\">Voy a dictarte un proceso de operaciones que hago en Mango. Tu trabajo es capturar la información en formato estructurado, sin inventar ni rellenar huecos — si algo no te lo digo, pregúntame.\n\n<span class=\"p-title\">Para cada paso del proceso, captura:<\u002Fspan><ol>\n<li>Número y nombre del paso<\u002Fli>\n<li>Actor que lo ejecuta (quién hace, quién aprueba, quién decide)<\u002Fli>\n<li>Tiempo activo (trabajo real) y tiempo de espera (si aplica)<\u002Fli>\n<li>Herramienta o sistema usado (software, plataforma, documento)<\u002Fli>\n<li>Input que entra al paso y output que sale<\u002Fli>\n<li>¿Es una decisión? ¿En qué criterio se basa? ¿En qué se ramifica?<\u002Fli>\n<li>Excepciones: qué puede salir mal y qué se hace cuando pasa<\u002Fli>\n<li>Diagnóstico rápido: si pudieras, ¿eliminarías, combinarías, automatizarías o simplificarías este paso? ¿Por qué sí o por qué no?<\u002Fli>\n<\u002Fol>\n<span class=\"p-title\">Al final, dame un resumen con estas 10 dimensiones:<\u002Fspan><ol>\n<li>Actores involucrados (lista completa)<\u002Fli>\n<li>Tiempo activo total vs. tiempo de ciclo total<\u002Fli>\n<li>Herramientas y sistemas usados<\u002Fli>\n<li>Inputs y outputs del proceso completo<\u002Fli>\n<li>Puntos de decisión clave<\u002Fli>\n<li>Excepciones y caminos alternativos<\u002Fli>\n<li>Volumen (cuántas veces al día/semana/mes se ejecuta)<\u002Fli>\n<li>Costo estimado (directo y costo de oportunidad)<\u002Fli>\n<li>Métricas de éxito (cómo se sabe que salió bien)<\u002Fli>\n<li>Riesgos y dependencias críticas (qué pasa si falla)<\u002Fli>\n<\u002Fol>\n<span class=\"p-title\">Impacto de negocio:<\u002Fspan><ul>\n<li>¿Qué pasa para Mango si este proceso falla o se retrasa?<\u002Fli>\n<li>¿A quién afecta externamente? (Distribuidor, Constructor, regulador, banco, etc.)<\u002Fli>\n<li>¿Hay algún SLA comprometido (con cliente, con STP, con el regulador)?<\u002Fli>\n<li>¿Este proceso habilita o bloquea algún objetivo del negocio?<\u002Fli>\n<\u002Ful>\n<span class=\"p-title\">Versión ideal (en 3 líneas):<\u002Fspan>Después de capturar cómo se hace hoy, describe brevemente cómo sería este proceso si no tuviéramos ninguna limitación de recursos, tiempo o tecnología. Solo los cambios grandes, no los detalles.\n\n<span class=\"p-title\">Metadatos finales:<\u002Fspan><ul>\n<li>Frecuencia (diario / semanal / mensual / por evento)<\u002Fli>\n<li>Dolor del 1 al 5 (1 = fluye solo, 5 = quema tiempo y genera errores)<\u002Fli>\n<li>¿El proceso se detiene si la persona clave se enferma?<\u002Fli>\n<li>Datos duros disponibles (volumen mensual, tasa de error, tiempo promedio, etc.)<\u002Fli>\n<\u002Ful>\nYo te voy a dictar como me venga. Tú organiza y pregunta si falta algo. Si no pregunto por datos duros y los tengo, voy a agregarlos — todo número importa.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECTION 5 — After mapping -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">05<\u002Fspan>\n        <h2>Después del mapeo<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"section-lede\">Siguiendo el mismo orden de prioridad, generamos los mapas visuales y hacemos el diagnóstico uno por uno. De ahí salen las decisiones de automatización, rediseño, responsabilidades y qué tipo de apoyo necesita Ops para la ejecución.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- SECTION 6 — Next steps -->\n    <section>\n      <div class=\"section-head\">\n        <span class=\"section-num\">06<\u002Fspan>\n        <h2>Qué sigue<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"closing\">\n        <div class=\"closing-row\">\n          <span class=\"closing-who\">Ops · próxima semana<\u002Fspan>\n          <span class=\"closing-what\">Enlistar todos los procesos, asignarles criticidad, y empezar a dictarlos a ChatGPT en orden de prioridad.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"closing-row\">\n          <span class=\"closing-who\">CoS · en paralelo<\u002Fspan>\n          <span class=\"closing-what\">Tomar cada respuesta del Doc compartido y trasladarla al mapa visual del proceso correspondiente.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"closing-row\">\n          <span class=\"closing-who\">Después<\u002Fspan>\n          <span class=\"closing-what\">Sesión de diagnóstico por proceso, en el mismo orden de prioridad, para definir qué automatizar, qué rediseñar y qué apoyo necesita Ops.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer>\n      <img src=\"596da2d9-921c-4f0b-baa2-6addba540197\" alt=\"MANGO\">\n      <div>Diagnóstico Ops · Abril 2026<\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n<script>\n  lucide.createIcons();\n\n  function copyPrompt(btn) {\n    const el = document.getElementById('prompt-text');\n    const text = el.innerText;\n    navigator.clipboard.writeText(text).then(() => {\n      const label = btn.querySelector('span');\n      const original = label.textContent;\n      label.textContent = 'Copiado';\n      btn.classList.add('copied');\n      setTimeout(() => {\n        label.textContent = original;\n        btn.classList.remove('copied');\n      }, 1800);\n    }).catch(() => {\n      const range = document.createRange();\n      range.selectNodeContents(el);\n      const sel = window.getSelection();\n      sel.removeAllRanges();\n      sel.addRange(range);\n    });\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
